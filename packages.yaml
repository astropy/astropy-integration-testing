# Packages tested by `astropy-integration run`.
#
# One block per package = one row in the dashboard. For each astropy
# variant (stable / pre / dev) and each Python version, the runner
# builds a shared venv, installs astropy first then each package in
# turn (skipping any that the resolver can't satisfy alongside the
# existing set), then runs `pytest --pyargs <module>` for each one
# that installed.
#
# `tier` is purely a category label used for ordering and the optional
# `--tiers` CLI filter. Conventions: `coordinated` for the official
# coordinated set, `affiliated` for affiliated packages from the frozen
# pre-APE 22 registry, `pyopensci` for affiliated packages reviewed
# through the pyOpenSci process, `other` for anything else worth testing.
#
# `python_versions` is the list of Python versions to test against;
# use uv's notation, so e.g. "3.14t" for the free-threaded build.

python_versions:
  - "3.12"
  - "3.14"

packages:
  - pypi_name: asdf_astropy
    tier: coordinated
    module: asdf_astropy
    repo_url: https://github.com/astropy/asdf-astropy.git
    install_extras: [test]

  - pypi_name: astropy_healpix
    tier: coordinated
    module: astropy_healpix
    repo_url: https://github.com/astropy/astropy-healpix.git
    install_extras: [test]

  - pypi_name: astroquery
    tier: coordinated
    module: astroquery
    repo_url: https://github.com/astropy/astroquery.git
    install_extras: [test, all]

  - pypi_name: ccdproc
    tier: coordinated
    module: ccdproc
    repo_url: https://github.com/astropy/ccdproc.git
    install_extras: [test, all]
    extra_deps: [psutil]

  - pypi_name: photutils
    tier: coordinated
    module: photutils
    repo_url: https://github.com/astropy/photutils.git
    install_extras: [test, all]

  - pypi_name: regions
    tier: coordinated
    module: regions
    repo_url: https://github.com/astropy/regions.git
    install_extras: [test, all]

  - pypi_name: reproject
    tier: coordinated
    module: reproject
    repo_url: https://github.com/astropy/reproject.git
    install_extras: [test, all]
    extra_deps: [gwcs]

  - pypi_name: specreduce
    tier: coordinated
    module: specreduce
    repo_url: https://github.com/astropy/specreduce.git
    install_extras: [test]

  - pypi_name: specutils
    tier: coordinated
    module: specutils
    repo_url: https://github.com/astropy/specutils.git
    install_extras: [all, test]

  - pypi_name: sunpy
    tier: other
    module: sunpy
    repo_url: https://github.com/sunpy/sunpy.git
    install_extras: [tests, all]
    pytest_args: ["-c", "sunpy_pytest.ini"]

  # --- Affiliated packages auto-imported from
  # https://github.com/astropy/astropy.github.com/blob/main/affiliated/registry.json
  # Module names defaulted to pypi_name with hyphens/dots replaced by underscores;
  # individual packages may need overrides if pytest --pyargs fails to find them.
  - pypi_name: agnpy
    tier: affiliated
    module: agnpy
    repo_url: https://github.com/cosimoNigro/agnpy.git

  - pypi_name: APLpy
    tier: affiliated
    module: aplpy   # installed package name is lowercase
    repo_url: https://github.com/aplpy/aplpy.git
    install_extras: [test]

  - pypi_name: astroalign
    tier: affiliated
    module: astroalign
    repo_url: https://github.com/quatrope/astroalign.git

  - pypi_name: astroML
    tier: affiliated
    module: astroML
    repo_url: https://github.com/astroML/astroML.git

  - pypi_name: astroplan
    tier: affiliated
    module: astroplan
    repo_url: https://github.com/astropy/astroplan.git

  - pypi_name: astroscrappy
    tier: affiliated
    module: astroscrappy
    repo_url: https://github.com/astropy/astroscrappy.git

  - pypi_name: baseband
    tier: affiliated
    module: baseband
    repo_url: https://github.com/mhvk/baseband.git

  - pypi_name: BayesicFitting
    tier: affiliated
    module: BayesicFitting
    repo_url: https://github.com/dokester/BayesicFitting.git
    # BayesicFitting ships unittest-style tests as Test*.py (capital T);
    # override pytest's default `python_files` glob so it picks them up.
    pytest_args: ["-o", "python_files=Test*.py"]

  - pypi_name: cluster-lensing
    tier: affiliated
    module: clusterlensing   # installed package has no underscore
    repo_url: https://github.com/jesford/cluster-lensing.git

  - pypi_name: corral-pipeline
    tier: affiliated
    module: corral_pipeline
    repo_url: https://github.com/toros-astro/corral.git

  - pypi_name: dust_extinction
    tier: affiliated
    module: dust_extinction
    repo_url: https://github.com/karllark/dust_extinction.git

  - pypi_name: einsteinpy
    tier: affiliated
    module: einsteinpy
    repo_url: https://github.com/einsteinpy/einsteinpy.git

  - pypi_name: feets
    tier: affiliated
    module: feets
    repo_url: https://github.com/carpyncho/feets.git

  - pypi_name: gala
    tier: affiliated
    module: gala
    repo_url: https://github.com/adrn/gala.git

  - pypi_name: galpy
    tier: affiliated
    module: galpy
    repo_url: https://github.com/jobovy/galpy.git

  - pypi_name: gammapy
    tier: affiliated
    module: gammapy
    repo_url: https://github.com/gammapy/gammapy.git
    install_extras: [test]

  - pypi_name: ginga
    tier: affiliated
    module: ginga
    repo_url: https://github.com/ejeschke/ginga.git
    # `ginga/tests/test_zarr.py` uses removed zarr 3.x API; ignore it
    # so the rest of the suite (256 passing tests) can run.
    pytest_args: ["--ignore-glob=*test_zarr.py"]

  - pypi_name: glueviz
    tier: affiliated
    # glueviz is a meta-package; the actual code (and tests) lives in
    # glue-core which it pulls in. Its installed module is `glue`.
    module: glue
    repo_url: https://github.com/glue-viz/glue.git

  - pypi_name: gwcs
    tier: affiliated
    module: gwcs
    repo_url: https://github.com/spacetelescope/gwcs.git

  - pypi_name: halotools
    tier: affiliated
    module: halotools
    repo_url: https://github.com/astropy/halotools.git

  - pypi_name: hendrics
    tier: affiliated
    module: hendrics
    repo_url: https://github.com/StingraySoftware/HENDRICS.git
    install_extras: [test]

  - pypi_name: hips
    tier: affiliated
    module: hips
    repo_url: https://github.com/hipspy/hips.git

  - pypi_name: imexam
    tier: affiliated
    module: imexam
    repo_url: https://github.com/spacetelescope/imexam.git

  - pypi_name: kanon
    tier: affiliated
    module: kanon
    repo_url: https://github.com/legau/kanon.git

  - pypi_name: lenstronomy
    tier: affiliated
    module: lenstronomy
    repo_url: https://github.com/lenstronomy/lenstronomy.git

  - pypi_name: ligo.skymap
    tier: affiliated
    # PEP 420 namespace package: installed as ligo/skymap/, not ligo_skymap.
    module: ligo.skymap
    repo_url: https://git.ligo.org/lscsoft/ligo.skymap.git
    install_extras: [test]

  - pypi_name: linetools
    tier: affiliated
    module: linetools
    repo_url: https://github.com/linetools/linetools.git
    install_extras: [test]
    # linetools imports pkg_resources (deprecated stdlib alias); pull
    # in setuptools so it's available at runtime.
    extra_deps: [setuptools]

  - pypi_name: marxs
    tier: affiliated
    module: marxs
    repo_url: https://github.com/Chandra-MARX/marxs.git
    install_extras: [test]
    # Two test files require an external MARX C library we don't have;
    # ignoring them lets the rest of the suite collect.
    pytest_args:
      - "--ignore-glob=*test_hrma.py"
      - "--ignore-glob=*test_all_optics.py"

  - pypi_name: mocpy
    tier: affiliated
    module: mocpy
    repo_url: https://github.com/cds-astro/mocpy.git
    install_extras: [dev]

  - pypi_name: naima
    tier: affiliated
    module: naima
    repo_url: https://github.com/zblz/naima.git

  - pypi_name: omnifit
    tier: affiliated
    module: omnifit
    repo_url: https://github.com/RiceMunk/omnifit.git

  - pypi_name: poliastro
    tier: affiliated
    module: poliastro
    repo_url: https://github.com/poliastro/poliastro.git

  - pypi_name: pycbc
    tier: affiliated
    module: pycbc
    repo_url: https://github.com/gwastro/pycbc.git

  - pypi_name: pydl
    tier: affiliated
    module: pydl
    repo_url: https://github.com/weaverba137/pydl.git
    install_extras: [test]

  - pypi_name: pyregion
    tier: affiliated
    module: pyregion
    repo_url: https://github.com/astropy/pyregion.git

  - pypi_name: pyspeckit
    tier: affiliated
    module: pyspeckit
    repo_url: https://github.com/pyspeckit/pyspeckit.git

  - pypi_name: pyvo
    tier: affiliated
    module: pyvo
    repo_url: https://github.com/astropy/pyvo.git
    install_extras: [test]

  - pypi_name: regularizepsf
    tier: affiliated
    module: regularizepsf
    repo_url: https://github.com/punch-mission/regularizepsf.git

  - pypi_name: sbpy
    tier: affiliated
    module: sbpy
    repo_url: https://github.com/NASA-Planetary-Science/sbpy.git

  - pypi_name: sncosmo
    tier: affiliated
    module: sncosmo
    repo_url: https://github.com/sncosmo/sncosmo.git

  - pypi_name: spectral-cube
    tier: affiliated
    module: spectral_cube
    repo_url: https://github.com/radio-astro-tools/spectral-cube.git
    install_extras: [test]

  - pypi_name: spherical-geometry
    tier: affiliated
    module: spherical_geometry
    repo_url: https://github.com/spacetelescope/spherical_geometry.git

  - pypi_name: statmorph
    tier: affiliated
    module: statmorph
    repo_url: https://github.com/vrodgom/statmorph.git

  - pypi_name: synphot
    tier: affiliated
    module: synphot
    repo_url: https://github.com/spacetelescope/synphot_refactor.git

  # --- Affiliated packages reviewed through the pyOpenSci process and
  # cross-listed at https://www.pyopensci.org/python-packages.html
  # (post-APE 22; not in the frozen registry.json above).
  - pypi_name: astrodata
    tier: pyopensci
    module: astrodata
    repo_url: https://github.com/GeminiDRSoftware/astrodata.git

  - pypi_name: astromartini
    tier: pyopensci
    # installed and imported as `martini`; `astromartini` is just the PyPI name.
    module: martini
    repo_url: https://github.com/kyleaoman/martini.git
    install_extras: [testing]

  - pypi_name: autogalaxy
    tier: pyopensci
    module: autogalaxy
    repo_url: https://github.com/PyAutoLabs/PyAutoGalaxy.git
    install_extras: [test]

  - pypi_name: GALFITools
    tier: pyopensci
    module: galfitools   # installed package name is lowercase
    repo_url: https://github.com/canorve/GALFITools.git
    install_extras: [testing]

  - pypi_name: petrofit
    tier: pyopensci
    module: petrofit
    repo_url: https://github.com/PetroFit/petrofit.git
    install_extras: [dev]

  - pypi_name: stingray
    tier: pyopensci
    module: stingray
    repo_url: https://github.com/StingraySoftware/stingray.git
    install_extras: [test]

  - pypi_name: zodipy
    tier: pyopensci
    module: zodipy
    repo_url: https://github.com/Cosmoglobe/zodipy.git
