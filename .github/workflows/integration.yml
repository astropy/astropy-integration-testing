name: integration-matrix

on:
  schedule:
    - cron: '0 6 * * 0'   # Sundays at 06:00 UTC
  workflow_dispatch:
  pull_request:

permissions:
  contents: write   # to push gh-pages on main / schedule / dispatch

concurrency:
  # One in-flight run per PR, one per main/dispatch invocation.
  # PR runs cancel previous in-progress ones; main runs queue.
  group: integration-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  variant:
    strategy:
      fail-fast: false
      matrix:
        variant: [stable, latest, dev]
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Cache ~/.cache/uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.variant }}-${{ hashFiles('packages.yaml') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.variant }}-
            uv-${{ runner.os }}-

      - name: Install runtime deps
        run: pip install packaging pyyaml

      - name: Run ${{ matrix.variant }} variant
        run: python run_integration.py --variant ${{ matrix.variant }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.variant }}
          path: results/${{ matrix.variant }}.json

  dashboard:
    needs: variant
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime deps
        run: pip install jinja2

      - name: Download all variant results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          merge-multiple: true
          path: results/

      # PR path: single-page summary, uploaded as a non-zipped artifact
      # that GitHub's artifact viewer can render directly in the browser.
      - name: Build single-page dashboard (PR preview)
        if: github.event_name == 'pull_request'
        run: python build_dashboard.py --single-page

      - name: Upload single-page preview
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-preview
          path: site/dashboard.html
          archive: false
          overwrite: true

      # Main / schedule / dispatch path: full multi-page dashboard
      # published to gh-pages.
      - name: Build full dashboard
        if: github.event_name != 'pull_request'
        run: python build_dashboard.py

      - name: Publish to gh-pages
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
          commit_message: Update integration dashboard
