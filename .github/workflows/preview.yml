name: dashboard-preview

on:
  pull_request:

permissions:
  contents: read
  actions: read   # to find and download the latest main run's results

concurrency:
  group: dashboard-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime deps
        run: pip install jinja2

      - name: Find latest successful main run
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --workflow=integration.yml \
            --branch=main \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          if [ -z "$run_id" ]; then
            echo "No successful main integration runs yet; preview will render with no results."
          else
            echo "Using main run $run_id"
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download main run results
        if: steps.latest.outputs.run_id != ''
        uses: actions/download-artifact@v8
        with:
          pattern: results-*
          merge-multiple: true
          path: results/
          run-id: ${{ steps.latest.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build single-page dashboard
        run: python build_dashboard.py --single-page

      - name: Upload dashboard as non-zipped artifact
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-preview
          path: site/dashboard.html
          archive: false
          # Keep one preview around per PR; the new upload supersedes the old one.
          overwrite: true

